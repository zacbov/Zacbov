<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZACBOV — Atelier de projets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090F; --bg2:#0D0F1A; --ink:#ECEEF6; --mut:#8B90A6; --line:rgba(236,238,246,.08);
  --jeux:#F6537E; --pedago:#4FE3A3; --fac:#6FA8FF; --perso:#FFB454; --sites:#B98CFF;
  --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font:400 16px/1.6 'Outfit',sans-serif;overflow-x:hidden}
::selection{background:var(--sites);color:#0A0C14}

/* aurora backdrop */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.aurora i{position:absolute;border-radius:50%;filter:blur(90px);opacity:.22;animation:float 18s ease-in-out infinite alternate}
.aurora i:nth-child(1){width:52vw;height:52vw;background:#6FA8FF;top:-20vw;left:-12vw}
.aurora i:nth-child(2){width:44vw;height:44vw;background:#B98CFF;top:-8vw;right:-14vw;animation-delay:-6s}
.aurora i:nth-child(3){width:40vw;height:40vw;background:#F6537E;bottom:-22vw;left:30vw;opacity:.13;animation-delay:-12s}
@keyframes float{to{transform:translate(6vw,4vh) scale(1.12)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 22px}

/* header */
header{display:flex;align-items:center;justify-content:space-between;padding:26px 0}
.logo{font:800 22px 'Syne';letter-spacing:.06em}
.logo b{background:linear-gradient(100deg,#6FA8FF,#B98CFF,#F6537E);-webkit-background-clip:text;background-clip:text;color:transparent}
.count{font-size:13px;color:var(--mut);border:1px solid var(--line);border-radius:99px;padding:6px 14px}

/* hero */
.hero{padding:52px 0 44px}
.hero h1{font:800 clamp(44px,9vw,104px)/0.98 'Syne';letter-spacing:-.02em}
.hero h1 span{display:block;background:linear-gradient(95deg,#ECEEF6 20%,#6FA8FF 55%,#B98CFF 75%,#F6537E 100%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shine 8s linear infinite}
@keyframes shine{to{background-position:200% 0}}
.hero p{margin-top:20px;max-width:520px;color:var(--mut);font-size:17px}

/* filters */
.filters{display:flex;flex-wrap:wrap;gap:10px;padding:8px 0 34px;position:sticky;top:0;z-index:5;background:linear-gradient(var(--bg) 70%,transparent)}
.chip{--c:var(--ink);cursor:pointer;font:500 14px 'Outfit';color:var(--ink);background:var(--bg2);border:1px solid var(--line);border-radius:99px;padding:9px 18px;transition:.25s}
.chip:hover{border-color:var(--c);color:var(--c)}
.chip.on{background:var(--c);border-color:var(--c);color:#0A0C14;font-weight:600}
.chip[data-f="Jeux"]{--c:var(--jeux)}.chip[data-f="Pédago"]{--c:var(--pedago)}
.chip[data-f="Fac"]{--c:var(--fac)}.chip[data-f="Perso"]{--c:var(--perso)}.chip[data-f="Sites"]{--c:var(--sites)}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding-bottom:80px}
.card{--c:var(--sites);position:relative;display:flex;flex-direction:column;gap:10px;background:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.015));border:1px solid var(--line);border-radius:var(--r);padding:22px;text-decoration:none;color:var(--ink);transition:transform .3s,border-color .3s,box-shadow .3s;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(420px 180px at 20% -10%,color-mix(in srgb,var(--c) 22%,transparent),transparent 70%);opacity:0;transition:.35s}
.card:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--c) 55%,transparent);box-shadow:0 20px 50px -25px color-mix(in srgb,var(--c) 55%,transparent)}
.card:hover::before{opacity:1}
.card:focus-visible{outline:2px solid var(--c);outline-offset:3px}
.card.jeux{--c:var(--jeux)}.card.pedago{--c:var(--pedago)}.card.fac{--c:var(--fac)}.card.perso{--c:var(--perso)}.card.sites{--c:var(--sites)}
.tag{align-self:flex-start;font:600 11px 'Outfit';letter-spacing:.12em;text-transform:uppercase;color:var(--c);border:1px solid color-mix(in srgb,var(--c) 45%,transparent);border-radius:99px;padding:4px 11px}
.card h2{font:700 21px 'Syne';letter-spacing:-.01em}
.card p{font-size:14px;color:var(--mut);flex:1;min-height:1.4em}
.meta{display:flex;align-items:center;gap:12px;margin-top:6px}
.bar{flex:1;height:5px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,color-mix(in srgb,var(--c) 60%,transparent),var(--c))}
.pct{font:600 12px 'Outfit';color:var(--c);min-width:34px;text-align:right}
.open{position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;color:var(--mut);transition:.3s}
.card:hover .open{background:var(--c);color:#0A0C14;border-color:var(--c);transform:rotate(45deg)}
.card.hide{display:none}

footer{padding:30px 0 46px;border-top:1px solid var(--line);color:var(--mut);font-size:13px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
footer code{color:var(--ink);background:var(--bg2);padding:2px 8px;border-radius:6px;font-size:12px}
@media(max-width:560px){.hero{padding:36px 0 30px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="aurora"><i></i><i></i><i></i></div>
<div class="wrap">

<header>
  <div class="logo"><b>ZAC</b>BOV</div>
  <div class="count" id="count"></div>
</header>

<section class="hero">
  <h1>L'atelier<span>des projets</span></h1>
  <p>Jeux, outils pédagogiques, applis perso et expérimentations — tout ce qu'on construit ensemble, réuni au même endroit.</p>
</section>

<nav class="filters" id="filters">
  <button class="chip on" data-f="*">Tous</button>
  <button class="chip" data-f="Jeux">Jeux</button>
  <button class="chip" data-f="Pédago">Pédago</button>
  <button class="chip" data-f="Fac">Fac</button>
  <button class="chip" data-f="Perso">Perso</button>
  <button class="chip" data-f="Sites">Sites</button>
</nav>

<main class="grid" id="grid"></main>

<footer>
  <span>Pour ajouter un projet : dépose ton fichier dans <code>projets/&lt;nom&gt;/index.html</code></span>
  <span>ZACBOV · 2026</span>
</footer>
</div>

<script>
const P=[
["POTD","Jeux","potd","Extraction shooter inspiré du court-métrage",2],
["Tarkov","Jeux","tarkov","Livre dont vous êtes le héros",2],
["Warhammer LDVELH","Jeux","warhammer-ldvelh","Livre dont vous êtes le héros",2],
["Labyrinthe","Jeux","labyrinthe","Livre dont vous êtes le héros",2],
["Épreuves","Jeux","epreuves","Livre dont vous êtes le héros",2],
["Warhammer Plateau","Jeux","warhammer-plateau","Jeu de plateau interactif",2],
["Mordheim","Jeux","mordheim","Jeu de plateau interactif",2],
["Pharma : The Gathering","Jeux","pharma-the-gathering","Jeu de cartes pharmaceutique",2],
["Corpo Atlas","Pédago","corpo-atlas","Atlas interactif du corps",2],
["Pharmagotchi","Jeux","pharmagotchi","Compagnon virtuel à faire pousser",3],
["Affichages Salles","Fac","affichages-salles","Planning des salles",3],
["Assistant Perso","Perso","assistant-perso","Dashboard lanceur d'applications",3],
["Bird IA","Pédago","bird-ia","Cadre e-ink ornithologique",3],
["Herbier Maudit","Jeux","herbier-maudit","Roguelike façon Isaac, version botanique",3],
["Pharmaville","Jeux","pharmaville","Ville pharmaceutique à explorer",3],
["Lames","Fac","lames","Banque de lames histologiques",3],
["Rallye","Fac","rallye","Rallye pédagogique modernisé",3],
["Garde-Manger","Perso","garde-manger","Gestion des stocks de la maison",4],
["Pilulier","Perso","pilulier","Pilulier mobile",4],
["Zuper IA","Perso","zuper-ia","Assistant intelligent",4],
["PaintHammer","Perso","painthammer","Suivi de peinture de figurines",4],
["Plant Voxel","Pédago","plant-voxel","Codex botanique en voxels 3D",4],
["Jobov","Sites","jobov","Site vitrine",4],
["Plantes Tox","Pédago","plantes-tox","Répertoire des plantes toxiques",5],
["Reco Plantes","Pédago","reco-plantes","Reconnaissance des plantes",5],
["Stock Inventaire","Fac","stock-inventaire","Inventaire des produits",1],
["Android Capacitor","Perso","android-capacitor","Portage Android des applis",5],
["Réducteur 3D","Perso","reducteur-3d","Optimisation de modèles 3D",1],
["3D vers Code","Perso","3d-vers-code","Sculpteur d'objets Three.js",1],
["Plan 3D","Fac","plan-3d","Plans 3D des locaux",1],
];
const cls={"Jeux":"jeux","Pédago":"pedago","Fac":"fac","Perso":"perso","Sites":"sites"};
const grid=document.getElementById('grid');
grid.innerHTML=P.map(([n,c,slug,d,s])=>{
  const pct=s*20;
  return `<a class="card ${cls[c]}" data-c="${c}" href="projets/${slug}/index.html">
    <span class="tag">${c}</span>
    <h2>${n}</h2>
    <p>${d}</p>
    <div class="meta"><div class="bar"><i style="width:${pct}%"></i></div><span class="pct">${pct}%</span></div>
    <span class="open" aria-hidden="true">↗</span>
  </a>`;
}).join('');
const count=document.getElementById('count');
const update=f=>{
  let v=0;
  document.querySelectorAll('.card').forEach(c=>{
    const show=f==='*'||c.dataset.c===f;
    c.classList.toggle('hide',!show); if(show)v++;
  });
  count.textContent=v+' projet'+(v>1?'s':'');
};
update('*');
document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('.chip'); if(!b)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); update(b.dataset.f);
});
</script>
</body>
</html>
